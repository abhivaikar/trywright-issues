name: Feature request
description: Suggest something for Trywright
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests that align with Trywright's core vision 
        are most likely to be considered — exploring websites through 
        Playwright and learning the API interactively.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation you're in when you want this
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to your workflow?
      options:
        - Nice to have
        - Would use it often
        - Blocking my use of Trywright
    validations:
      required: true
