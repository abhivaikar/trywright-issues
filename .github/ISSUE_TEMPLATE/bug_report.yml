name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check if this issue already exists.

  - type: input
    id: version
    attributes:
      label: Trywright version
      description: Run `trywright --version` in your terminal
      placeholder: "1.0.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Run `node --version`
      placeholder: "v20.0.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser affected
      multiple: true
      options:
        - Chromium
        - Firefox
        - WebKit
        - All browsers
        - Not browser-specific
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Headless
        - Headed
        - Both
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Be as specific as possible
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Trywright at localhost:3333
        2. Enter URL ...
        3. Run this REPL command ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output or error message
      description: Paste any relevant output here
      render: shell
